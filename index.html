<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Emoji Search</title>

    <!-- Google Font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <!-- Font Awesome -->
    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">

    <!-- CSS -->
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <!-- Header -->
    <header>
        <h1>😀 Emoji Search</h1>
        <p>Search your favorite emoji and click to copy.</p>
    </header>

    <!-- Search -->
    <section class="search-section">

        <div class="search-box">
            <i class="fa-solid fa-magnifying-glass"></i>

            <input
                type="text"
                id="searchInput"
                placeholder="Search emoji..."
                autocomplete="off">

        </div>

    </section>

    <!-- Categories -->
    <section class="categories">

        <button class="category active" data-category="all">All</button>

        <button class="category" data-category="smileys">
            😀 Smileys
        </button>

        <button class="category" data-category="animals">
            🐶 Animals
        </button>

        <button class="category" data-category="food">
            🍕 Food
        </button>

        <button class="category" data-category="travel">
            ✈️ Travel
        </button>

        <button class="category" data-category="sports">
            ⚽ Sports
        </button>

        <button class="category" data-category="objects">
            💡 Objects
        </button>

        <button class="category" data-category="hearts">
            ❤️ Hearts
        </button>

    </section>

    <!-- Result Count -->
    <div class="result-info">

        <span id="resultCount">0 Emojis Found</span>

    </div>

    <!-- Emoji Grid -->
    <main>

        <div id="emojiContainer" class="emoji-grid">

            <!-- JavaScript will generate emoji cards -->

        </div>

    </main>

    <!-- Empty State -->
    <section id="emptyState" class="empty-state">

        <img
            src="https://cdn-icons-png.flaticon.com/512/7486/7486807.png"
            alt="No Results">

        <h2>No Emoji Found</h2>

        <p>Try searching with another keyword.</p>

    </section>

    <!-- Toast -->
    <div id="toast" class="toast">

        ✅ Emoji Copied!

    </div>

    <!-- Footer -->
    <footer>

        <p>
            Made with ❤️ using HTML, CSS & JavaScript
        </p>

    </footer>

    <!-- JS -->
    <script src="script.js"></script>

</body>
<button id="themeToggle" class="theme-btn">
    <i class="fa-solid fa-moon"></i>
    <span>Dark Mode</span>
</button>
</html>
